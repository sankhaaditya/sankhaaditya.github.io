<!DOCTYPE html>
<html>
<body>
<svg height="500" width="500">
  
  <line x1="250" y1="0" x2="250" y2="3000" style="stroke:rgb(0,0,0);stroke-width:2" />
  
  <line x1="0" y1="250" x2="3000" y2="250" style="stroke:rgb(0,0,0);stroke-width:2" />
  
  <line id="myline" x1="3000" y1="250" x2="250" y2="250" style="stroke:rgb(255,0,0);stroke-width:2" />
  Sorry, your browser does not support inline SVG.
</svg>
Slope: <input type="text" id="mytext" value="0">
<p id="myp" value="0">
</body>
<script>
var defaulty1 = 250;
document.getElementById("mytext").addEventListener("input", function() {
	var y1 = defaulty1;
	document.getElementById("myp").innerHTML=document.getElementById("mytext").value;
    var slope = document.getElementById("mytext").value;
    if (slope != "") {
    	slope = parseFloat(slope)
    	y1 = parseFloat(document.getElementById("myline").getAttribute("y2")) - slope*		(parseFloat(document.getElementById("myline").getAttribute("x1"))-						parseFloat(document.getElementById("myline").getAttribute("x2")))
    }
    document.getElementById("myline").setAttribute("y1", y1);
})
</script>
</html>
